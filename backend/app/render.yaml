services:
  - type: web
    name: gastotrack-api
    env: php
    region: singapore
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: gastotrack-db
    plan: free
    region: singapore
